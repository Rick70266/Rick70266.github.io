<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* --- 基礎設定 --- */
body {
    margin: 0;
    font-family: "Microsoft JhengHei", Arial, sans-serif;
    background: linear-gradient(135deg, #1f2937 0%, #04f8d8 100%);
    background-attachment: fixed;
    min-height: 100vh;
    color: rgb(255, 255, 255);
    display: flex;
    flex-direction: column; /* 預設手機版由上而下 */
}

/* --- 導覽列 (手機版優化) --- */
.sidebar {
    width: 100%;
    background: rgba(31, 41, 55, 0.95);
    backdrop-filter: blur(10px);
    padding: 15px;
    box-sizing: border-box;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    position: sticky; /* 手機版捲動時固定在頂部 */
    top: 0;
    z-index: 1000;
}

.nav-links {
    display: flex; 
    justify-content: center;
    overflow-x: auto; /* 若選單太長，手機版可以左右滑動 */
    white-space: nowrap;
    gap: 8px;
    padding-bottom: 5px;
}

/* 隱藏手機版捲軸 */
.nav-links::-webkit-scrollbar { display: none; }

.sidebar a {
    color: white;
    padding: 6px 12px;
    text-decoration: none;
    border-radius: 6px;
    background: rgba(4, 248, 216, 0.1);
    border: 1px solid rgba(4, 248, 216, 0.3);
    font-size: 13px;
    flex-shrink: 0;
}

/* --- 主內容 --- */
.content {
    padding: 20px;
    box-sizing: border-box;
    width: 100%;
}

.header-flex {
    display: flex;
    flex-direction: column; /* 手機版頭像置中 */
    align-items: center;
    text-align: center;
    margin-top: 10px;
}

.profile {
    width: 120px; /* 手機版頭像縮小一點 */
    height: 120px;
    object-fit: cover;
    border-radius: 50%;
    border: 3px solid #ffffff;
    margin-bottom: 15px;
}

/* --- 元件樣式 --- */
.card { 
    background: rgba(22, 27, 34, 0.8); 
    padding: 18px; 
    border-radius: 12px; 
    margin-top: 15px; 
    border: 1px solid rgba(255, 255, 255, 0.1); 
    font-size: 0.95rem; /* 手機版字體略小 */
}

.project-image {
    width: 100%;
    max-width: 100%;
    height: auto;
}

/* --- 桌機版佈局 (螢幕大於 992px 時自動切換) --- */
@media (min-width: 992px) {
    body { flex-direction: row; }
    
    .sidebar { 
        width: 240px; 
        height: 100vh; 
        position: fixed; 
        left: 0; top: 0;
        padding: 50px 20px; 
        border-right: 1px solid rgba(255, 255, 255, 0.1); 
        border-bottom: none;
        display: flex;
        flex-direction: column;
    }
    
    .nav-links { 
        flex-direction: column; 
        overflow-x: visible;
        gap: 12px;
    }
    
    .sidebar a { 
        display: block; 
        font-size: 16px;
        background: transparent;
        padding: 12px;
    }

    .sidebar a:hover {
        background: rgba(4, 248, 216, 0.2);
    }
    
    .content { 
        margin-left: 240px; 
        padding: 50px 10%; 
    }
    
    .header-flex { flex-direction: row; text-align: left; }
    .profile { width: 180px; height: 180px; margin-right: 30px; }
}
</style>


<body>

    </div>
</div>

<div class="content">
    <h1>作品集展示</h1>
    
    <div class="card">

        <p>基於 Azure 與 Python 的自動化銷售監控系統。</p>
        <div class="project-image-container">
            <img src="assets/dashboard.jpg" class="project-image" alt="Dashboard 展示">

</div>
